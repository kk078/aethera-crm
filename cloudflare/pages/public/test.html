<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Test - Aethera CRM</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
        .provider-card { border: 1px solid #eee; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .error { color: red; background: #ffeeee; padding: 15px; border-radius: 8px; }
        .success { color: green; background: #f0fff0; padding: 15px; border-radius: 8px; }
        .loading { padding: 50px; text-align: center; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        input { padding: 8px; font-size: 14px; width: 300px; margin-right: 10px; }
        .stats { font-size: 14px; color: #666; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Aethera Provider Directory Test</h1>
    <div id="login-section">
        <p>Enter your credentials:</p>
        <input type="text" id="username" placeholder="Username" value="aethera">
        <input type="password" id="password" placeholder="Password" value="Aetherahealthcare@2026">
        <button onclick="login()">Login</button>
    </div>
    
    <div id="status"></div>
    <div id="content"></div>

    <script>
        const API_BASE = 'https://aethera-crm-api.aetherahealthcare.workers.dev';
        let token = localStorage.getItem('token') || '';
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            showStatus('Logging in...', 'loading');
            
            try {
                const res = await fetch(`${API_BASE}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                console.log('Login response:', data);
                
                if (data.token) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    showStatus('✅ Login successful! Token stored.', 'success');
                    loadProviders();
                } else {
                    showStatus('❌ Login failed: ' + JSON.stringify(data), 'error');
                }
            } catch (e) {
                showStatus('❌ Login error: ' + e.message, 'error');
                console.error('Login error:', e);
            }
        }
        
        async function loadProviders() {
            showStatus('Loading providers...', 'loading');
            
            try {
                const res = await fetch(`${API_BASE}/api/v1/providers?page=1&per_page=20`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('Response status:', res.status);
                console.log('Response headers:', [...res.headers.entries()]);
                
                const data = await res.json();
                console.log('Full API response:', data);
                
                if (data.data && Array.isArray(data.data)) {
                    showStatus(`✅ Loaded ${data.data.length} providers (total: ${data.pagination?.total || 'unknown'})`, 'success');
                    renderProviders(data.data);
                } else if (Array.isArray(data)) {
                    showStatus(`✅ Loaded ${data.length} providers`, 'success');
                    renderProviders(data);
                } else {
                    showStatus('❌ Unexpected data structure: ' + JSON.stringify(data).substring(0, 200), 'error');
                }
            } catch (e) {
                showStatus('❌ Error loading providers: ' + e.message, 'error');
                console.error('Load error:', e);
            }
        }
        
        function renderProviders(providers) {
            let html = `<div class="stats"><strong>${providers.length}</strong> providers loaded</div>`;
            html += '<table><thead><tr>';
            html += '<th>Name</th><th>NPI</th><th>City</th><th>State</th><th>Specialty</th>';
            html += '</tr></thead><tbody>';
            
            providers.forEach(p => {
                const name = p.provider_type === 'individual' 
                    ? `Dr. ${p.first_name || ''} ${p.last_name || ''}`
                    : p.organization_name;
                html += `<tr>
                    <td><strong>${name || 'Unknown'}</strong></td>
                    <td>${p.npi}</td>
                    <td>${p.city || '-'}</td>
                    <td>${p.state || '-'}</td>
                    <td>${p.specialty_primary || '-'}</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            document.getElementById('content').innerHTML = html;
        }
        
        function showStatus(message, type) {
            document.getElementById('status').innerHTML = `<div class="${type}">${message}</div>`;
        }
        
        // Auto-login if token exists
        if (token) {
            document.getElementById('login-section').style.display = 'none';
            showStatus('Using saved token. Loading providers...', 'loading');
            loadProviders();
        }
    </script>
</body>
</html>
