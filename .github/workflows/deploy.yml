name: Deploy Aethera CRM

on:
  push:
    branches: [ main ]
    paths:
      - 'cloudflare/workers/**'
      - 'cloudflare/pages/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd cloudflare/workers && npm install

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        run: |
          echo "API Token: $CLOUDFLARE_API_TOKEN"
          echo "Account ID: $CLOUDFLARE_ACCOUNT_ID"
          wrangler deploy --env production --account-id "$CLOUDFLARE_ACCOUNT_ID" -y
        working-directory: cloudflare/workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd cloudflare/pages && npm install

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Build
        run: cd cloudflare/pages && npm run build

      - name: Deploy to Cloudflare Pages
        run: |
          echo "API Token: $CLOUDFLARE_API_TOKEN"
          echo "Account ID: $CLOUDFLARE_ACCOUNT_ID"
          wrangler pages deploy dist --project-name aethera-crm --account-id "$CLOUDFLARE_ACCOUNT_ID"
        working-directory: cloudflare/pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
