name: Deploy Aethera CRM

on:
  push:
    branches: [ main ]
    paths:
      - 'cloudflare/workers/**'
      - 'cloudflare/pages/**'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd cloudflare/workers && npm install

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --env production
        working-directory: cloudflare/workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd cloudflare/pages && npm install

      - name: Build
        run: cd cloudflare/pages && npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name aethera-crm
        working-directory: cloudflare/pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
