name: Deploy Aethera CRM

on:
  push:
    branches: [ main ]
    paths:
      - 'cloudflare/workers/**'
      - 'cloudflare/pages/**'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd cloudflare/workers && npm ci

      - name: Login to Cloudflare
        run: |
          echo "$CLOUDFLARE_API_TOKEN" > api_token.txt
          npx wrangler login --auth-token "$(cat api_token.txt)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: cloudflare/workers

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        working-directory: cloudflare/workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd cloudflare/pages && npm ci

      - name: Login to Cloudflare
        run: |
          echo "$CLOUDFLARE_API_TOKEN" > api_token.txt
          npx wrangler login --auth-token "$(cat api_token.txt)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: cloudflare/pages

      - name: Build and Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name aethera-crm
        working-directory: cloudflare/pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
